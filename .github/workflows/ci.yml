name: CI

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Lint backend
        run: flake8 src
      - name: Test backend
        run: pytest src/tests

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm test
      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Validate Docker Compose build
        run: docker compose build backend frontend
